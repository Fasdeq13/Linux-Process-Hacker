      <text x="45" y="18" font-family="Consolas, monospace" font-size="13" fill="#4ade80" text-anchor="middle">/proc</text>
      <rect x="100" y="0" width="110" height="26" rx="13" fill="#1e293b" stroke="#22d3ee" stroke-width="1.2"/>
      <text x="155" y="18" font-family="Consolas, monospace" font-size="13" fill="#22d3ee" text-anchor="middle">Qt Widgets</text>
      <rect x="220" y="0" width="110" height="26" rx="13" fill="#1e293b" stroke="#f87171" stroke-width="1.2"/>
