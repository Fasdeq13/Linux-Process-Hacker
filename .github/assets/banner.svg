      <rect x="340" y="0" width="120" height="26" rx="13" fill="#1e293b" stroke="#facc15" stroke-width="1.2"/>
      <text x="400" y="18" font-family="Consolas, monospace" font-size="13" fill="#facc15" text-anchor="middle">v0.2 stable</text>
