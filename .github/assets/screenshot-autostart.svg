<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="320" rx="12" fill="#1e293b"/>

  <rect x="0" y="0" width="900" height="34" rx="12" fill="#0f172a"/>
  <circle cx="20" cy="17" r="6" fill="#f87171"/>
  <circle cx="40" cy="17" r="6" fill="#facc15"/>
  <circle cx="60" cy="17" r="6" fill="#4ade80"/>
  <text x="450" y="22" font-family="Segoe UI, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Linux Process Hacker v0.2 — Autostart Tab</text>

  <rect x="0" y="34" width="120" height="30" fill="#0b1220"/>
  <text x="60" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Processes</text>
  <rect x="120" y="34" width="100" height="30" fill="#0b1220"/>
  <text x="170" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Network</text>
  <rect x="220" y="34" width="100" height="30" fill="#111827"/>
  <text x="270" y="53" font-family="Segoe UI, sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">Autostart</text>

  <g font-family="Consolas, monospace" font-size="11.5" fill="#94a3b8">
    <rect x="0" y="64" width="900" height="26" fill="#111827"/>
    <text x="20" y="81" fill="#64748b">Enabled</text>
    <text x="100" y="81" fill="#64748b">Name</text>
    <text x="280" y="81" fill="#64748b">Comment</text>
    <text x="520" y="81" fill="#64748b">Command</text>
    <text x="760" y="81" fill="#64748b">Scope</text>

    <g><rect x="0" y="90" width="900" height="24" fill="#1e293b"/>
      <rect x="16" y="96" width="12" height="12" rx="2" fill="none" stroke="#4ade80" stroke-width="1.4"/>
      <path d="M18 102 L21 105 L26 98" fill="none" stroke="#4ade80" stroke-width="1.6"/>
      <text x="100" y="106" fill="#f8fafc">Dropbox</text><text x="280" y="106">Cloud file sync</text>
      <text x="520" y="106">/usr/bin/dropbox start -i</text><text x="760" y="106" fill="#22d3ee">User</text></g>

    <g><rect x="0" y="114" width="900" height="24" fill="#18202f"/>
      <rect x="16" y="120" width="12" height="12" rx="2" fill="none" stroke="#4ade80" stroke-width="1.4"/>
      <path d="M18 126 L21 129 L26 122" fill="none" stroke="#4ade80" stroke-width="1.6"/>
      <text x="100" y="130" fill="#f8fafc">NetworkManager Applet</text><text x="280" y="130">Network status icon</text>
      <text x="520" y="130">nm-applet</text><text x="760" y="130" fill="#facc15">System</text></g>

    <g><rect x="0" y="138" width="900" height="24" fill="#1e293b"/>
      <rect x="16" y="144" width="12" height="12" rx="2" fill="none" stroke="#64748b" stroke-width="1.4"/>
      <text x="100" y="154" fill="#64748b">Slack</text><text x="280" y="154" fill="#64748b">Team messaging</text>
      <text x="520" y="154" fill="#64748b">/usr/bin/slack -u</text><text x="760" y="154" fill="#22d3ee">User</text></g>

    <g><rect x="0" y="162" width="900" height="24" fill="#18202f"/>
      <rect x="16" y="168" width="12" height="12" rx="2" fill="none" stroke="#4ade80" stroke-width="1.4"/>
      <path d="M18 174 L21 177 L26 170" fill="none" stroke="#4ade80" stroke-width="1.6"/>
      <text x="100" y="178" fill="#f8fafc">Print Applet</text><text x="280" y="178">Printer notifications</text>
      <text x="520" y="178">/usr/bin/print-applet</text><text x="760" y="178" fill="#facc15">System</text></g>
  </g>

  <rect x="20" y="268" width="90" height="28" rx="6" fill="#1e293b" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="65" y="286" font-family="Segoe UI, sans-serif" font-size="12" fill="#f8fafc" text-anchor="middle">Refresh</text>
  <rect x="120" y="268" width="120" height="28" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.2"/>
  <text x="180" y="286" font-family="Segoe UI, sans-serif" font-size="12" fill="#f87171" text-anchor="middle">Remove Entry</text>
</svg>
